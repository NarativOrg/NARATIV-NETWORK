# nginx-rtmp on the Mac mini.
#
# Install:
#   brew install nginx
#   brew tap denji/nginx && brew install nginx-full --with-rtmp-module
# Or build with the rtmp module from https://github.com/arut/nginx-rtmp-module
#
# Two RTMP applications:
#   /internal   — receives the SCHEDULED feed from our ffmpeg playout AND
#                 the LIVE feed from a remote presenter. OBS reads these
#                 as Media Sources.
#   /distribute — exists only to receive the OBS encoder output and fan
#                 it out to every public destination via `push` blocks.
#                 (Alternatively, configure OBS's built-in Multiple-RTMP
#                 plugin to push to all destinations and remove this app.)
#
# Lock /internal down to localhost. /distribute should not be hit by
# anything except OBS on the same Mac.
#
# NOTE: replace YT/FB/X stream keys via environment substitution at install
# time, OR keep them inline here in a NON-COMMITTED copy. Never commit keys.

worker_processes  auto;
events { worker_connections  1024; }

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        # ───────────────────────────────────────────────────────────
        # Internal scheduled-content app: ffmpeg playout publishes here
        # with stream name "scheduled". No auth (localhost only).
        application internal {
            live on;
            allow publish 127.0.0.1;
            allow play   127.0.0.1;
            deny  publish all;
            deny  play   all;
            record off;
        }

        # ───────────────────────────────────────────────────────────
        # Live ingest app: contributors with `rtmp_push` shows publish
        # here. Stream NAME = their per-show stream key; nginx-rtmp calls
        # our admin server on every publish to validate the key. Wrong
        # key → publish rejected at the door (HTTP non-2xx).
        application live {
            live on;
            allow publish all;       # anyone may TRY; on_publish gates it
            allow play   127.0.0.1;
            deny  play   all;
            record off;

            # Adjust port if your admin runs elsewhere.
            on_publish      http://127.0.0.1:8765/api/rtmp_authorize;
            # on_publish_done http://127.0.0.1:8765/api/rtmp_disconnect;

            # Drop stalled publishers after 10s of no input.
            drop_idle_publisher 10s;
        }

        # ───────────────────────────────────────────────────────────
        application distribute {
            live on;
            allow publish 127.0.0.1;
            deny publish all;
            deny play all;          # nobody pulls from here

            # Each `push` line below sends the encoded stream to one
            # public destination. Replace the *_KEY tokens.
            push rtmp://a.rtmp.youtube.com/live2/__YOUTUBE_KEY__;
            # push rtmps://live-api-s.facebook.com:443/rtmp/__FACEBOOK_KEY__;
            # push rtmp://live.twitch.tv/app/__TWITCH_KEY__;
            # push rtmp://x-ingest.video.x.com/live/__X_KEY__;

            # Auto-republish on the upstream side (what nginx-rtmp does
            # by default — listed for clarity).
            push_reconnect 5s;
        }

    }
}

http {
    server {
        listen 8080;
        # Tiny health endpoint so the watchdog knows nginx is up.
        location /healthz { return 200 'ok'; add_header Content-Type text/plain; }
        # The nginx-rtmp module ships an `rtmp_stat` page — wire it here
        # if you want a real-time view of clients/bitrate.
        # location /rtmp_stat { rtmp_stat all; }
    }
}
